<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale de Salida - CBTis258</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --accent-blue: #34678d;
            --success-green: #2d5a4c;
            --danger-red: #dc3545;
            --border-color: #e0e0e0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* --- Barra Lateral (Menú Completo) --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }

        .sidebar h2 {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 30px;
            font-weight: 700;
            text-align: center;
            text-transform: lowercase;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-link {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            font-weight: 500;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .nav-link:hover { background-color: #f0f4f8; }
        .nav-link.active { background-color: var(--accent-blue); color: white; }

        .btn-logout {
            margin-top: auto;
            padding: 12px;
            background-color: var(--danger-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- Contenido del Vale de Salida --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .document-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-width: 900px;
            margin: 0 auto;
        }

        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .doc-header h1 { margin: 0; font-size: 1.4rem; color: var(--text-main); }

        .grid-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .field-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
        
        input, select, textarea {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.9rem;
            background: #fcfcfc;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 0.8rem; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .signatures {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin-top: 50px;
            text-align: center;
        }

        .sig-line {
            border-top: 1px solid #333;
            margin-top: 60px;
            padding-top: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 40px;
        }

        .btn { padding: 12px 25px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
        .btn-save { background: var(--success-green); color: white; }
        .btn-cancel { background: var(--danger-red); color: white; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>sistema de inventario</h2>
        <div class="nav-menu">
        <li class="nav-item"><a href="inicio.html" class="nav-link">Inicio</a></li>

<li class="nav-item"><a href="gestion_de_equipos.html" class="nav-link">Gestión de equipos</a></li>

<li class="nav-item"><a href="fallas.html" class="nav-link">Registro de Fallas</a></li>

<li class="nav-item"><a href="salida.html" class="nav-link">Vales de Salida</a></li>

<li class="nav-item"><a href="reporte.html" class="nav-link">Reportes</a></li>

<li class="nav-item"><a href="registro.html" class="nav-link">Registro de usuario</a></li>
        <button class="btn-logout">Cerrar Sesión</button>
    </nav>

    <main class="main-content">
        <div class="document-card">
            <div class="doc-header">
                <h1>Vale de Salida de Almacén</h1>
                <div><label>Folio:</label> <span style="font-weight: bold; color: var(--danger-red);">VS-2026-003</span></div>
            </div>

            <div class="grid-header">
                <div class="field-group">
                    <label>Fecha de Salida</label>
                    <input type="date" value="2026-03-09">
                </div>
                <div class="field-group" style="grid-column: span 2;">
                    <label>Área Solicitante</label>
                    <select>
                        <option>Laboratorio 1</option>
                        <option>Laboratorio 2</option>
                        <option>Laboratorio 3</option>
                    </select>
                </div>
                <div class="field-group" style="grid-column: span 3;">
                    <label>Nombre del Responsable</label>
                    <input type="text" placeholder="Nombre completo de quien recibe">
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Descripción</th>
                        <th width="80">Unidad</th>
                        <th width="100">Cant. Sol.</th>
                        <th width="100">Cant. Ent.</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" placeholder="Artículo..." style="width: 90%;"></td>
                        <td><select><option>Pz</option></select></td>
                        <td><input type="number" value="0" style="width: 60px;"></td>
                        <td><input type="number" value="0" style="width: 60px;"></td>
                    </tr>
                </tbody>
            </table>

            <div class="signatures">
                <div>
                    <div class="sig-line">Firma del Responsable</div>
                </div>
                <div>
                    <div class="sig-line">Firma de Almacén</div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-cancel">Cancelar</button>
                <button class="btn btn-save">Guardar Vale</button>
            </div>
        </div>
    </main>

</body>

</html>
