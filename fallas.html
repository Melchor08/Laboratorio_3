<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Fallas - CBTis258</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --accent-blue: #34678d;
            --danger-red: #dc3545;
            --border-color: #e0e0e0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* --- Barra Lateral (Sidebar) - Identica a las otras pantallas --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }

        .sidebar h2 {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 40px;
            font-weight: 700;
            text-align: center;
            text-transform: lowercase; /* Mantiene la esencia del original */
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-link {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            font-weight: 500;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .nav-link:hover { background-color: #f0f4f8; }
        .nav-link.active { background-color: var(--accent-blue); color: white; }

        .btn-logout {
            margin-top: auto;
            padding: 12px;
            background-color: var(--danger-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- Contenido Principal --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--text-main);
        }

        /* Tarjeta del Formulario */
        .form-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-width: 900px;
        }

        .form-card h3 {
            margin-top: 0;
            color: var(--accent-blue);
            font-size: 1.2rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* Grid del Formulario */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .full-row { grid-column: span 2; }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input, select, textarea {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            background-color: #fcfcfc;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background-color: #fff;
        }

        textarea { height: 100px; resize: none; }

        /* Botones de acción */
        .form-actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-save { background: #2d5a4c; color: white; }
        .btn-update { background: var(--accent-blue); color: white; }
        .btn-cancel { background: var(--danger-red); color: white; }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>sistema de inventario</h2>
        <div class="nav-menu">
         <li class="nav-item"><a href="inicio.html" class="nav-link">Inicio</a></li>

<li class="nav-item"><a href="inicio.html" class="nav-link">Inicio</a></li>

<li class="nav-item"><a href="gestion_de_equipos.html" class="nav-link">Gestión de equipos</a></li>

<li class="nav-item"><a href="fallas.html" class="nav-link">Registro de Fallas</a></li>

<li class="nav-item"><a href="requisiciones.html" class="nav-link">Requisiciones</a></li>

<li class="nav-item"><a href="salida.html" class="nav-link">Vales de Salida</a></li>

<li class="nav-item"><a href="reporte.html" class="nav-link">Reportes</a></li>

<li class="nav-item"><a href="registro.html" class="nav-link">Registro de usuario</a></li>
        </div>
        <button class="btn-logout">Cerrar Sesión</button>
    </nav>

    <main class="main-content">
        
        <div class="page-header">
            <h1>Registro de Fallas Técnicas</h1>
        </div>

        <div class="form-card">
            <h3>Información del Equipo</h3>
            
            <form class="form-grid">
                <div class="field-group">
                    <label>ID del Equipo:</label>
                    <input type="text" placeholder="Ej: 101, 205...">
                </div>

                <div class="field-group">
                    <label>Tipo de Problema:</label>
                    <select>
                        <option>Seleccionar opción...</option>
                        <option>Falla de Hardware</option>
                        <option>Falla de Software</option>
                        <option>Red / Conectividad</option>
                    </select>
                </div>

                <div class="field-group full-row">
                    <label>Descripción detallada del problema:</label>
                    <textarea placeholder="Explique brevemente la falla detectada..."></textarea>
                </div>

                <div class="field-group">
                    <label>Nombre del Equipo:</label>
                    <input type="text" value="PC-LAB1-01">
                </div>

                <div class="field-group">
                    <label>Laboratorio:</label>
                    <select>
                        <option>LAB-1</option>
                        <option>LAB-2</option>
                        <option>LAB-3</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Estado del Reporte:</label>
                    <select>
                        <option>Pendiente</option>
                        <option>En Mantenimiento</option>
                        <option>Solucionado</option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Fecha de Reporte:</label>
                    <input type="date" value="2026-03-09">
                </div>

                <div class="field-group">
                    <label>Fecha de Solución (Si aplica):</label>
                    <input type="date">
                </div>
            </form>

            <div class="form-actions">
                <button type="button" class="btn btn-save">Registrar Reporte</button>
                <button type="button" class="btn btn-update">Actualizar Estado</button>
                <button type="button" class="btn btn-cancel">Cancelar</button>
            </div>
        </div>
    </main>

</body>
</html>
