<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Variables de color para fácil edición */
        :root {
            --primary-color: #34678d;
            --primary-hover: #2a5270;
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 700;
        }

        h2 {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box; /* Crucial para el padding */
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
        }

        .test-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eeeeee;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .test-info span {
            display: block;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Sistema de Inventario</h1>
        <h2>Laboratorio CBTis258</h2>

        <form>
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" placeholder="Ingrese su usuario">
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña">
            </div>

               <a href="inicio.html">
    <button type="button" class="btn-login">Iniciar Sesión</button>

            
<p style="margin-top:15px; font-size:0.9rem;">
    ¿No tienes cuenta?
    <a href="registro.html">Registrarse</a>
</p>
            
        </form>


</a>
    </div>

</body>
</html>
