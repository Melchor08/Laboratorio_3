<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Inventario</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f4c81,#1e88e5);
}

/* CONTENEDOR ESTILO APP MOVIL */

.phone-container{
width:360px;
height:640px;
background:white;
border-radius:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
justify-content:center;
padding:35px;
}

/* TITULOS */

h1{
text-align:center;
color:#0f4c81;
font-size:24px;
margin-bottom:5px;
}

h2{
text-align:center;
color:#1e88e5;
font-size:14px;
margin-bottom:30px;
font-weight:400;
}

/* INPUTS */

.form-group{
margin-bottom:20px;
}

label{
font-size:14px;
color:#333;
margin-bottom:6px;
display:block;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #dcdcdc;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#1e88e5;
outline:none;
box-shadow:0 0 5px rgba(30,136,229,0.3);
}

/* BOTON */

.btn-login{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#1e88e5,#0f4c81);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn-login:hover{
transform:scale(1.03);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* REGISTRO */

.register{
text-align:center;
margin-top:18px;
font-size:13px;
}

.register a{
color:#1e88e5;
text-decoration:none;
font-weight:600;
}

.register a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="phone-container">

<h1>Sistema de Inventario</h1>
<h2>Laboratorio CBTis 258</h2>

<form>

<div class="form-group">
<label>Usuario</label>
<input type="text" placeholder="Ingrese su usuario">
</div>

<div class="form-group">
<label>Contraseña</label>
<input type="password" placeholder="Ingrese su contraseña">
</div>

<a href="inicio.html">
<button type="button" class="btn-login">Iniciar Sesión</button>
</a>

<div class="register">
¿No tienes cuenta?
<a href="registro.html">Registrarse</a>
</div>

</form>

</div>

</body>
</html>
</html>
