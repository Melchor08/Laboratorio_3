<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - CBTis258</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --accent-blue: #34678d;
            --success-green: #2d5a4c;
            --danger-red: #dc3545;
            --border-color: #e0e0e0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* --- Barra Lateral --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }

        .sidebar h2 {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 30px;
            font-weight: 700;
            text-align: center;
            text-transform: lowercase;
        }

        .nav-link {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            font-weight: 500;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .nav-link:hover { background-color: #f0f4f8; }
        .nav-link.active { background-color: var(--accent-blue); color: white; }

        .btn-logout {
            margin-top: auto;
            padding: 12px;
            background-color: var(--danger-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- Contenido Principal --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .form-container {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

        .field-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        
        label { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        
        input, select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fcfcfc;
        }

        /* Botones */
        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-delete { background: #fff; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-delete:hover { background: #f0f0f0; }
        .btn-register { background: var(--success-green); color: white; }
        .btn-register:hover { opacity: 0.9; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>sistema de inventario</h2>
        <div class="nav-menu">
<li class="nav-item"><a href="inicio.html" class="nav-link">Inicio</a></li>

<li class="nav-item"><a href="gestion_de_equipos.html" class="nav-link">Gestión de equipos</a></li>

<li class="nav-item"><a href="fallas.html" class="nav-link">Registro de Fallas</a></li>

<li class="nav-item"><a href="salida.html" class="nav-link">Vales de Salida</a></li>

<li class="nav-item"><a href="reporte.html" class="nav-link">Reportes</a></li>

<li class="nav-item"><a href="registro.html" class="nav-link">Registro de usuario</a></li>
        </div>
        <button class="btn-logout">Cerrar Sesión</button>
    </nav>

    <main class="main-content">
        <div class="form-container">
            <h1>Registro de Usuario</h1>
            
            <div class="field-group">
                <label>Nombre Completo:</label>
                <input type="text" placeholder="Nombre completo del usuario">
            </div>

            <div class="field-group">
                <label>Usuario:</label>
                <input type="text" placeholder="Nombre de usuario para iniciar sesión">
            </div>

            <div class="field-group">
                <label>Contraseña:</label>
                <input type="password" placeholder="Contraseña segura">
            </div>

            <div class="field-group">
                <label>Rol:</label>
                <select>
                    <option>Docente / Usuario</option>
                    <option>Administrador</option>
                    <option>Soporte Técnico</option>
                    <option>Directivo</option>
                    <option>Almacén</option>
                    <option>Responsable</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn btn-delete">Eliminar</button>
                <button class="btn btn-register">Registrar</button>
            </div>
                
        </div>
    </main>

</body>

</html>
